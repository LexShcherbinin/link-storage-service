version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: link-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: links
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: link-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: link-app
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/links?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"

volumes:
  pg_data: